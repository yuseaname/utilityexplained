content_roots:
  - app
  - pages
  - blog
  - content
build_dirs:
  - .next
  - out
exclude_dirs:
  - .git
  - node_modules
  - venv
  - dist
  - build
  - out
  - .next
  - .nuxt
  - .cache

scan_build: false

images_dest_candidates:
  - public/images
  - static/images
  - assets/images
  - images

pipeline:
  top_n: 20
  max_inline_images_per_1200_words: 3

placement:
  allow_markdown_placement: plan-only
  html_apply_enabled: true

adsense_safety:
  ad_marker_patterns:
    - ad
    - ads
    - sponsor
    - sponsored
    - googlesyndication
    - adsbygoogle

exclusions:
  exclude_page_path_patterns: ["404", "privacy", "terms", "admin"]
  exclude_page_heading_patterns: ["cookie", "consent"]

unique_composition_guardrail: true

openai:
  default_model: gpt-image-1
  default_quality: medium
  default_size: 1536x1024

market:
  mode: auto
  country: ""
  locale: ""

visual_localization:
  enabled: true
  rules_by_country:
    MX:
      injection: |
        Cultural realism:
        The scene must feel authentically Mexican, reflecting everyday life in Mexico.
        Avoid U.S. suburban styles, European interiors, or luxury-only environments.
      exclude_visual_cues:
        - US suburban architecture
        - European interiors
        - luxury-only settings
