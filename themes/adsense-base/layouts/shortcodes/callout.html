{{- /* callout.html — Info/warning/tip/danger callout boxes */ -}}
{{- /* Usage: callout "warning" "Note" — Content — /callout */ -}}
{{- $type := .Get 0 | default "info" -}}
{{- $title := .Get 1 | default "" -}}
<div class="my-4 p-4 rounded-lg border-l-4{{ if eq $type "warning" }} bg-yellow-50 border-yellow-400 text-yellow-800{{ else if eq $type "tip" }} bg-green-50 border-green-400 text-green-800{{ else if eq $type "danger" }} bg-red-50 border-red-400 text-red-800{{ else }} bg-blue-50 border-blue-400 text-blue-800{{ end }}">
  {{- with $title }}<p class="font-semibold mb-1">{{ . }}</p>{{ end -}}
  <div>{{ .Inner | markdownify }}</div>
</div>
